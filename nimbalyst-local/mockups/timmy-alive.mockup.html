<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:title" content="Is Timmy alive? 🐋">
  <meta property="og:description" content="Don't read the news. Ask Timmy yourself if he is still alive.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://istimmyalive.com">
  <meta property="og:image" content="https://istimmyalive.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Is Timmy alive? 🐋">
  <meta name="twitter:description" content="Don't read the news. Ask Timmy yourself if he is still alive.">
  <meta name="twitter:image" content="https://istimmyalive.com/og-image.png">

  <!-- Standard Meta Tags -->
  <meta name="description" content="Check if Timmy is still alive. Real news-based detection with an interactive whale friend.">
  <meta name="theme-color" content="#4a9fd4">
  <title>Is Timmy alive? 🐋</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      background: white;
      position: relative;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .left-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 40%;
      height: 100vh;
      background: white;
      z-index: 8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px;
      box-sizing: border-box;
    }

    .question {
      text-align: left;
      z-index: 10;
      padding: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      color: #0a1e3d;
      text-shadow: none;
      letter-spacing: 0px;
      line-height: 1.2;
    }

    .whale-container {
      position: fixed;
      top: 50%;
      right: 10%;
      transform: translateY(-50%);
      width: clamp(180px, 40vmin, 450px);
      height: clamp(180px, 40vmin, 450px);
      z-index: 10;
    }

    .whale {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #whaleWink { opacity: 0; }
    #whaleDeceased { opacity: 0; }

    .whale-container.deceased #whaleNormal,
    .whale-container.deceased #whaleWink {
      opacity: 0;
    }
    .whale-container.deceased #whaleDeceased {
      opacity: 1;
    }

    .check-button {
      position: fixed;
      bottom: 8vh;
      left: 30%;
      transform: translateX(-50%);
      z-index: 10;
      background: linear-gradient(135deg, #3B7BA6, #4A9FCA);
      border: none;
      color: white;
      padding: clamp(14px, 2.5vw, 18px) clamp(36px, 8vw, 56px);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: box-shadow 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    .check-button:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .check-button:disabled { opacity: 0.7; cursor: not-allowed; }

    .loading { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes showWink {
      0%, 100% { opacity: 0; }
      10%, 90%  { opacity: 1; }
    }
    @keyframes hideNormal {
      0%, 100% { opacity: 1; }
      10%, 90%  { opacity: 0; }
    }
    .whale-container:focus-within #whaleNormal {
      animation: hideNormal 0.5s ease-in-out forwards;
    }
    .whale-container:focus-within #whaleWink {
      animation: showWink 0.5s ease-in-out forwards;
    }
  </style>
</head>
<body>

<!-- Video Background -->
<video id="videoBackground" class="video-background" playsinline></video>

<!-- Left Overlay -->
<div class="left-overlay">
  <div class="question" id="titleText">Is <s>Timmy</s> Hope still alive?</div>
</div>

<div class="whale-container" id="whaleContainer">
  <input id="winkTrigger" tabindex="-1" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;border:none;outline:none;" readonly>
  <img class="whale" id="whaleNormal" src="./state_1_leer_dark.svg" alt="">
  <img class="whale" id="whaleWink" src="./state_2_dark.svg" alt="">
  <img class="whale" id="whaleDeceased" src="./state_3_dark.svg" alt="">
</div>

<button class="check-button" id="checkBtn" onclick="checkTimmyStatus()">Ask Timmy</button>

<script>
  // Load video on page load
  document.addEventListener('DOMContentLoaded', () => {
    const videoEl = document.getElementById('videoBackground');
    videoEl.src = './alive_vid.mov';
  });

  function triggerWhaleWink() {
    var trigger = document.getElementById('winkTrigger');
    trigger.blur();
    setTimeout(function() {
      trigger.focus();
      setTimeout(function() { trigger.blur(); }, 550);
    }, 20);
  }

  async function checkTimmyStatus() {
    const btn = document.getElementById('checkBtn');
    const titleEl = document.getElementById('titleText');
    const container = document.getElementById('whaleContainer');
    const videoEl = document.getElementById('videoBackground');

    btn.disabled = true;
    titleEl.innerHTML = 'Is <s>Timmy</s> Hope still alive?';
    titleEl.style.color = '#0a1e3d';
    btn.innerHTML = '<span class="loading">⏳</span> Asking Timmy...';
    container.classList.remove('deceased');

    // Play video once
    videoEl.currentTime = 0;
    videoEl.play().catch(err => console.log('Video play error:', err));

    let dead = false;

    try {
      const proxyUrl = 'https://felix.hamburg/istimmyalive/';

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 6000);
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }

      const text = await resp.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const items = Array.from(xml.querySelectorAll('item'));

      const deadWords  = ['tot', 'tote', 'gestorben', 'verendet', 'stirbt', 'sterben', 'dead', 'died', 'death'];
      const aliveWords = ['lebt', 'gerettet', 'rettet', 'rettung', 'lebend', 'alive', 'rescue', 'surviv', 'überleb'];

      let deadCount = 0, aliveCount = 0;

      items.forEach(item => {
        const content = (
          (item.querySelector('title')?.textContent || '') + ' ' +
          (item.querySelector('description')?.textContent || '')
        ).toLowerCase();

        deadWords.forEach(w  => { if (content.includes(w)) deadCount++;  });
        aliveWords.forEach(w => { if (content.includes(w)) aliveCount++; });
      });

      dead = deadCount > 0 && deadCount >= aliveCount;

    } catch (e) {
      titleEl.textContent = 'Kein Netzzugang';
      titleEl.style.color = '#ff6b6b';
      btn.innerHTML = 'Ask Timmy';
      btn.disabled = false;
      return;
    }

    if (dead) {
      titleEl.innerHTML = '<s>Timmy</s> Hope is dead 💀';
      titleEl.style.color = '#ff6b6b';
      btn.innerHTML = 'I am dead 💀';
      container.classList.add('deceased');
    } else {
      titleEl.innerHTML = '<s>Timmy</s> Hope is still alive';
      titleEl.style.color = '#0a1e3d';
      btn.innerHTML = 'I am still there';
      triggerWhaleWink();
    }

    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = 'Ask Timmy';
    }, 3000);
  }
</script>
</body>
</html>
