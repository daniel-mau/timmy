<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:title" content="Is Timmy alive? 🐋">
  <meta property="og:description" content="Don't read the news. Ask Timmy yourself if he is still alive.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://istimmyalive.com">
  <meta property="og:image" content="https://istimmyalive.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Is Timmy alive? 🐋">
  <meta name="twitter:description" content="Don't read the news. Ask Timmy yourself if he is still alive.">
  <meta name="twitter:image" content="https://istimmyalive.com/og-image.png">

  <!-- Standard Meta Tags -->
  <meta name="description" content="Check if Timmy is still alive. Real news-based detection with an interactive whale friend.">
  <meta name="theme-color" content="#4a9fd4">
  <title>Is Timmy alive? 🐋</title>

  <style>
    @font-face {
      font-family: 'FindetNemo';
      src: url('./FindetNemo-KVxD.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      background: #5EA8E1;
      position: relative;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 40% center;
      z-index: 0;
      background-color: #000;
    }

    .question {
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      padding: 0 20px;
      font-size: clamp(2.5rem, 6.5vw, 5rem);
      font-weight: 400;
      font-family: 'FindetNemo', sans-serif;
      color: white;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 0, 0, 0.3);
      letter-spacing: 0px;
      line-height: 1.3;
      text-transform: capitalize;
      width: 95%;
      max-width: 90vw;
      word-wrap: break-word;
      white-space: normal;
    }

    .check-button {
      position: fixed;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: white;
      border: none;
      color: #4A9FCA;
      padding: clamp(14px, 2.5vw, 18px) clamp(36px, 8vw, 56px);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: box-shadow 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    .check-button:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .check-button:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Loading button - HIDDEN */
    .loading-button {
      display: none;
    }

    #loadingDots {
      display: inline;
      letter-spacing: 0.05em;
    }

    .loading { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Loading Screen */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgb(123, 210, 241) 0%, rgb(64, 126, 208) 100%);
      z-index: 100;
      opacity: 1;
      transition: opacity 0.6s ease;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #loadingText {
      position: absolute;
      font-size: clamp(2.969rem, 7.719vw, 5.938rem);
      color: white;
      font-weight: 600;
      z-index: 102;
      text-align: center;
      font-family: 'FindetNemo', sans-serif;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #loadingSubtext {
      position: absolute;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: white;
      font-weight: 400;
      z-index: 102;
      text-align: center;
      top: 53%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Light rays from the surface - HIDDEN */
    .light-rays {
      display: none;
    }

    .bubbles-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% {
        bottom: -100px;
        opacity: 0;
        transform: translateX(0);
      }
      10% { opacity: 0.6; }
      50% { transform: translateX(10px); }
      90% { opacity: 0.6; }
      100% {
        bottom: 110vh;
        opacity: 0;
        transform: translateX(-5px);
      }
    }

    /* Bubble variation styles */
    .bubble:nth-child(1) { width: 12px; height: 12px; left: 10%; animation-duration: 6s; animation-delay: 0s; }
    .bubble:nth-child(2) { width: 20px; height: 20px; left: 20%; animation-duration: 7s; animation-delay: 1s; }
    .bubble:nth-child(3) { width: 9px; height: 9px; left: 30%; animation-duration: 5s; animation-delay: 0.5s; }
    .bubble:nth-child(4) { width: 18px; height: 18px; left: 40%; animation-duration: 8s; animation-delay: 2s; }
    .bubble:nth-child(5) { width: 14px; height: 14px; left: 50%; animation-duration: 6s; animation-delay: 0.7s; }
    .bubble:nth-child(6) { width: 16px; height: 16px; left: 60%; animation-duration: 7s; animation-delay: 1.5s; }
    .bubble:nth-child(7) { width: 10px; height: 10px; left: 70%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .bubble:nth-child(8) { width: 22px; height: 22px; left: 80%; animation-duration: 8s; animation-delay: 1.2s; }
    .bubble:nth-child(9) { width: 13px; height: 13px; left: 15%; animation-duration: 6.5s; animation-delay: 2.5s; }
    .bubble:nth-child(10) { width: 19px; height: 19px; left: 85%; animation-duration: 7.5s; animation-delay: 0.9s; }
    .bubble:nth-child(11) { width: 8px; height: 8px; left: 45%; animation-duration: 5.5s; animation-delay: 1.8s; }
    .bubble:nth-child(12) { width: 15px; height: 15px; left: 75%; animation-duration: 7s; animation-delay: 0.2s; }
    .bubble:nth-child(13) { width: 11px; height: 11px; left: 55%; animation-duration: 6.2s; animation-delay: 1.1s; }
    .bubble:nth-child(14) { width: 17px; height: 17px; left: 35%; animation-duration: 7.3s; animation-delay: 3s; }
    .bubble:nth-child(15) { width: 7px; height: 7px; left: 90%; animation-duration: 5.8s; animation-delay: 0.4s; }

    /* Hide main content until loading is done */
    .main-content {
      opacity: 0;
      transition: opacity 0.6s ease;
      background-color: #5EA8E1;
    }

    .main-content.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="light-rays"></div>
  <div class="bubbles-container">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>
  <button class="loading-button" disabled>LOADING<span id="loadingDots">...</span></button>
  <div id="loadingText">LOADING</div>
  <div id="loadingSubtext">Looking for Timmy 🐋</div>
</div>

<!-- Main Content -->
<div class="main-content">
  <!-- Video Background: autoplay+muted+playsinline required for iOS first-frame -->
  <video id="videoBackground" class="video-background" playsinline muted autoplay></video>
  <video id="deadVideoBackground" class="video-background" playsinline muted style="display:none"></video>

  <!-- Text overlay -->
  <div class="question" id="titleText">Is <s>Timmy</s> Hope still alive ?</div>

  <button class="check-button" id="checkBtn" onclick="checkTimmyStatus()">Ask Timmy</button>
</div>

<script>
  // Set static loading text
  const loadingTextEl = document.getElementById('loadingText');
  loadingTextEl.textContent = 'LOADING';

  // Preload both videos and hide loading screen when ready
  document.addEventListener('DOMContentLoaded', () => {
    const loadingScreen = document.getElementById('loadingScreen');
    const mainContent = document.querySelector('.main-content');
    const videoEl = document.getElementById('videoBackground');

    let aliveReady = false;
    let deadReady = false;

    function checkIfBothReady() {
      if (aliveReady && deadReady) {
        hideLoadingScreen();
      }
    }

    function hideLoadingScreen() {
      loadingScreen.style.opacity = '0';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        mainContent.classList.add('visible');
      }, 600);
    }

    // Set up alive video — autoplay+muted in HTML ensures iOS shows first frame
    videoEl.src = './alive_vid.mp4';
    videoEl.preload = 'auto';

    // Pause at first frame and reset to 0 so video starts from the beginning when played
    videoEl.addEventListener('timeupdate', () => {
      videoEl.pause();
      videoEl.currentTime = 0;
      aliveReady = true;
      checkIfBothReady();
    }, { once: true });

    // Fallback if timeupdate doesn't fire (e.g. autoplay blocked)
    videoEl.addEventListener('canplaythrough', () => {
      if (!aliveReady) {
        aliveReady = true;
        checkIfBothReady();
      }
    }, { once: true });

    // Preload the dead video using the dedicated HTML element
    const deadVideoEl = document.getElementById('deadVideoBackground');
    deadVideoEl.src = './dead_vid.mp4';
    deadVideoEl.preload = 'auto';

    deadVideoEl.addEventListener('canplaythrough', () => {
      deadReady = true;
      checkIfBothReady();
    }, { once: true });

    // Fallback: hide loading screen after 8s if videos take too long
    setTimeout(() => {
      if (!aliveReady || !deadReady) {
        hideLoadingScreen();
      }
    }, 8000);
  });

  async function checkTimmyStatus() {
    const btn = document.getElementById('checkBtn');
    const titleEl = document.getElementById('titleText');
    const videoEl = document.getElementById('videoBackground');

    btn.disabled = true;
    titleEl.innerHTML = 'Is <s>Timmy</s> Hope still alive ?';
    btn.innerHTML = '<span class="loading">⏳</span> Asking Timmy...';

    let dead = false;

    try {
      const proxyUrl = 'https://felix.hamburg/istimmyalive/';

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 6000);
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }

      const text = await resp.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const items = Array.from(xml.querySelectorAll('item'));

      const deadWords  = ['tot', 'tote', 'gestorben', 'verendet', 'stirbt', 'sterben', 'dead', 'died', 'death'];
      const aliveWords = ['lebt', 'gerettet', 'rettet', 'rettung', 'lebend', 'alive', 'rescue', 'surviv', 'überleb'];

      let deadCount = 0, aliveCount = 0;

      items.forEach(item => {
        const content = (
          (item.querySelector('title')?.textContent || '') + ' ' +
          (item.querySelector('description')?.textContent || '')
        ).toLowerCase();

        deadWords.forEach(w  => { if (content.includes(w)) deadCount++;  });
        aliveWords.forEach(w => { if (content.includes(w)) aliveCount++; });
      });

      dead = deadCount > 0 && deadCount >= aliveCount;

    } catch (e) {
      titleEl.textContent = 'No network connection';
      titleEl.style.color = '#ff6b6b';
      btn.innerHTML = 'Ask Timmy';
      btn.disabled = false;
      return;
    }

    // Show result and play corresponding video
    const deadVideoEl = document.getElementById('deadVideoBackground');
    // Reset text color to white for successful results
    titleEl.style.color = 'white';

    if (dead) {
      titleEl.innerHTML = '<s>Timmy</s> Hope is dead 💀';
      btn.innerHTML = 'I am dead 💀';

      // Switch to dead video without load() — just swap visibility and replay
      videoEl.pause();
      videoEl.style.display = 'none';
      deadVideoEl.style.display = 'block';
      deadVideoEl.currentTime = 0;
      deadVideoEl.play().catch(err => console.log('Video play error:', err));

      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = 'Ask Timmy';
      }, 3000);
    } else {
      titleEl.innerHTML = '<s>Timmy</s> Hope is alive !';
      btn.disabled = false;
      btn.innerHTML = 'Ask Timmy';

      // Switch back to alive video without load() — just swap visibility and replay
      deadVideoEl.pause();
      deadVideoEl.style.display = 'none';
      videoEl.style.display = 'block';
      videoEl.currentTime = 0;
      videoEl.play().catch(err => console.log('Video play error:', err));
    }
  }
</script>
</body>
</html>
