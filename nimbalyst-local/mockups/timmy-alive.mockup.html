  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      background: linear-gradient(to bottom, #f0f8ff 0%, #b8e0f5 20%, #4a9fd4 50%, #1a5fa8 70%, #0d2b5e 100%);
    }

    .scene {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 0;
    }

    .question {
      position: fixed;
      top: 6vh;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      padding: 0 20px;
      font-size: clamp(1.8rem, 6vw, 4rem);
      font-weight: 400;
      color: #0a1e3d;
      text-shadow: 0 2px 10px rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    .whale-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(180px, 50vmin, 540px);
      height: clamp(180px, 50vmin, 540px);
      z-index: 10;
    }

    .whale {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #whaleWink { opacity: 0; }
    #whaleDeceased { opacity: 0; }

    .whale-container.deceased #whaleNormal,
    .whale-container.deceased #whaleWink {
      opacity: 0;
    }
    .whale-container.deceased #whaleDeceased {
      opacity: 1;
    }

    .check-button {
      position: fixed;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: linear-gradient(135deg, #3B7BA6, #4A9FCA);
      border: none;
      color: white;
      padding: clamp(14px, 2.5vw, 18px) clamp(36px, 8vw, 56px);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: box-shadow 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    .check-button:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .check-button:disabled { opacity: 0.7; cursor: not-allowed; }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #3B7BA6;
      border-radius: 50px;
      padding: 8px;
      cursor: pointer;
      font-size: 24px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .loading { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes showWink {
      0%, 100% { opacity: 0; }
      10%, 90%  { opacity: 1; }
    }
    @keyframes hideNormal {
      0%, 100% { opacity: 1; }
      10%, 90%  { opacity: 0; }
    }
    .whale-container:focus-within #whaleNormal {
      animation: hideNormal 0.5s ease-in-out forwards;
    }
    .whale-container:focus-within #whaleWink {
      animation: showWink 0.5s ease-in-out forwards;
    }
  </style>
</head>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">🌙</button>

<!-- Page content -->
<div class="question" id="titleText">Is <s>Timmy</s> Hope still alive?</div>

<div class="whale-container" id="whaleContainer">
  <input id="winkTrigger" tabindex="-1" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;border:none;outline:none;" readonly>
  <img class="whale" id="whaleNormal" src="./state_1_leer.svg" alt="">
  <img class="whale" id="whaleWink" src="./state_2.svg" alt="">
  <img class="whale" id="whaleDeceased" src="./state_3.svg" alt="">
</div>

<button class="check-button" id="checkBtn" onclick="checkTimmyStatus()">Check</button>

<script>
  let isDarkMode = localStorage.getItem('whaleTheme') === 'dark';

  function updateTheme() {
    const whaleNormal = document.getElementById('whaleNormal');
    const whaleWink = document.getElementById('whaleWink');
    const whaleDeceased = document.getElementById('whaleDeceased');
    const toggle = document.getElementById('themeToggle');

    if (isDarkMode) {
      whaleNormal.src = './state_1_leer_dark.svg';
      whaleWink.src = './state_2_dark.svg';
      whaleDeceased.src = './state_3_dark.svg';
      toggle.textContent = '☀️';
    } else {
      whaleNormal.src = './state_1_leer.svg';
      whaleWink.src = './state_2.svg';
      whaleDeceased.src = './state_3.svg';
      toggle.textContent = '🌙';
    }
  }

  function toggleTheme() {
    isDarkMode = !isDarkMode;
    localStorage.setItem('whaleTheme', isDarkMode ? 'dark' : 'light');
    updateTheme();
  }

  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  updateTheme();

  function triggerWhaleWink() {
    var trigger = document.getElementById('winkTrigger');
    trigger.blur();
    setTimeout(function() {
      trigger.focus();
      setTimeout(function() { trigger.blur(); }, 550);
    }, 20);
  }

  async function checkTimmyStatus() {
    const btn = document.getElementById('checkBtn');
    const titleEl = document.getElementById('titleText');
    const container = document.getElementById('whaleContainer');

    btn.disabled = true;
    titleEl.innerHTML = 'Is <s>Timmy</s> Hope still alive?';
    titleEl.style.color = '#0a1e3d';
    btn.innerHTML = '<span class="loading">⏳</span> Searching news...';
    container.classList.remove('deceased');

    let dead = false;

    try {
      const rssUrl = 'https://news.google.com/rss/search?q=Timmy+Wal&hl=de&gl=DE&ceid=DE:de';
      const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(rssUrl);

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 6000);
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);

      const text = await resp.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const items = Array.from(xml.querySelectorAll('item'));

      const deadWords  = ['tot', 'tote', 'gestorben', 'verendet', 'stirbt', 'sterben', 'dead', 'died', 'death'];
      const aliveWords = ['lebt', 'gerettet', 'rettet', 'rettung', 'lebend', 'alive', 'rescue', 'surviv', 'überleb'];

      let deadCount = 0, aliveCount = 0;

      items.forEach(item => {
        const content = (
          (item.querySelector('title')?.textContent || '') + ' ' +
          (item.querySelector('description')?.textContent || '')
        ).toLowerCase();

        deadWords.forEach(w  => { if (content.includes(w)) deadCount++;  });
        aliveWords.forEach(w => { if (content.includes(w)) aliveCount++; });
      });

      dead = deadCount > 0 && deadCount >= aliveCount;

    } catch (e) {
      titleEl.textContent = 'Kein Netzzugang';
      titleEl.style.color = '#ff6b6b';
      btn.innerHTML = 'Check';
      btn.disabled = false;
      return;
    }

    if (dead) {
      titleEl.innerHTML = '<s>Timmy</s> Hope is dead 💀';
      titleEl.style.color = '#ff6b6b';
      btn.innerHTML = 'Results: DECEASED ⚠️';
      container.classList.add('deceased');
    } else {
      titleEl.innerHTML = '<s>Timmy</s> Hope is still alive';
      titleEl.style.color = '#0a1e3d';
      btn.innerHTML = 'Results: ALIVE ✓';
      triggerWhaleWink();
    }

    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = 'Check';
    }, 3000);
  }
</script>
</body>
