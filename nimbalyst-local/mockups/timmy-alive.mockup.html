<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:title" content="Is Timmy alive? 🐋">
  <meta property="og:description" content="Don't read the news. Ask Timmy yourself if he is still alive.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://istimmyalive.com">
  <meta property="og:image" content="https://istimmyalive.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Is Timmy alive? 🐋">
  <meta name="twitter:description" content="Don't read the news. Ask Timmy yourself if he is still alive.">
  <meta name="twitter:image" content="https://istimmyalive.com/og-image.png">

  <!-- Standard Meta Tags -->
  <meta name="description" content="Check if Timmy is still alive. Real news-based detection with an interactive whale friend.">
  <meta name="theme-color" content="#4a9fd4">
  <title>Is Timmy alive? 🐋</title>

  <style>
    @font-face {
      font-family: 'TouchOfNature';
      src: url('./TouchOfNature-vZBA.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      background: white;
      position: relative;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .question {
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      padding: 0 20px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      font-family: 'TouchOfNature', sans-serif;
      color: white;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 0px;
      line-height: 1.2;
      text-transform: capitalize;
      width: 100%;
      max-width: 90%;
      white-space: nowrap;
    }

    .check-button {
      position: fixed;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: white;
      border: none;
      color: #4A9FCA;
      padding: clamp(14px, 2.5vw, 18px) clamp(36px, 8vw, 56px);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: box-shadow 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    .check-button:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .check-button:disabled { opacity: 0.7; cursor: not-allowed; }

    .loading { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Video Background -->
<video id="videoBackground" class="video-background" playsinline></video>

<!-- Text overlay -->
<div class="question" id="titleText">Is <s>Timmy</s> Hope still alive?</div>

<button class="check-button" id="checkBtn" onclick="checkTimmyStatus()">Ask Timmy</button>

<script>
  // Load video on page load
  document.addEventListener('DOMContentLoaded', () => {
    const videoEl = document.getElementById('videoBackground');
    videoEl.src = './alive_vid.mov';
  });

  async function checkTimmyStatus() {
    const btn = document.getElementById('checkBtn');
    const titleEl = document.getElementById('titleText');
    const videoEl = document.getElementById('videoBackground');

    btn.disabled = true;
    titleEl.innerHTML = 'Is <s>Timmy</s> Hope still alive?';
    btn.innerHTML = '<span class="loading">⏳</span> ASKING TIMMY...';

    // Play video once
    videoEl.currentTime = 0;
    videoEl.play().catch(err => console.log('Video play error:', err));

    let dead = false;

    try {
      const proxyUrl = 'https://felix.hamburg/istimmyalive/';

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 6000);
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }

      const text = await resp.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const items = Array.from(xml.querySelectorAll('item'));

      const deadWords  = ['tot', 'tote', 'gestorben', 'verendet', 'stirbt', 'sterben', 'dead', 'died', 'death'];
      const aliveWords = ['lebt', 'gerettet', 'rettet', 'rettung', 'lebend', 'alive', 'rescue', 'surviv', 'überleb'];

      let deadCount = 0, aliveCount = 0;

      items.forEach(item => {
        const content = (
          (item.querySelector('title')?.textContent || '') + ' ' +
          (item.querySelector('description')?.textContent || '')
        ).toLowerCase();

        deadWords.forEach(w  => { if (content.includes(w)) deadCount++;  });
        aliveWords.forEach(w => { if (content.includes(w)) aliveCount++; });
      });

      dead = deadCount > 0 && deadCount >= aliveCount;

    } catch (e) {
      titleEl.textContent = 'Kein Netzzugang';
      titleEl.style.color = '#ff6b6b';
      btn.innerHTML = 'ASK TIMMY';
      btn.disabled = false;
      return;
    }

    // Wait for video to end before updating text
    function updateAfterVideo() {
      if (dead) {
        titleEl.innerHTML = '<s>Timmy</s> Hope is dead 💀';
        btn.innerHTML = 'I AM DEAD 💀';
      } else {
        titleEl.innerHTML = '<s>Timmy</s> Hope is alive!';
        btn.innerHTML = 'I AM STILL THERE';
      }

      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = 'ASK TIMMY';
      }, 3000);

      videoEl.removeEventListener('ended', updateAfterVideo);
    }

    videoEl.addEventListener('ended', updateAfterVideo);
  }
</script>
</body>
</html>
