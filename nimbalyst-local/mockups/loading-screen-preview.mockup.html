<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Screen Preview</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    /* Loading Screen */
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #4A9FCA 0%, #2E6B94 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    .bubbles-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.5);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% {
        bottom: -100px;
        opacity: 0;
      }
      10% {
        opacity: 0.7;
      }
      90% {
        opacity: 0.7;
      }
      100% {
        bottom: 110vh;
        opacity: 0;
      }
    }

    /* Bubble variation styles */
    .bubble:nth-child(1) { width: 30px; height: 30px; left: 10%; animation-duration: 6s; animation-delay: 0s; }
    .bubble:nth-child(2) { width: 50px; height: 50px; left: 20%; animation-duration: 7s; animation-delay: 1s; }
    .bubble:nth-child(3) { width: 25px; height: 25px; left: 30%; animation-duration: 5s; animation-delay: 0.5s; }
    .bubble:nth-child(4) { width: 45px; height: 45px; left: 40%; animation-duration: 8s; animation-delay: 2s; }
    .bubble:nth-child(5) { width: 35px; height: 35px; left: 50%; animation-duration: 6s; animation-delay: 0.7s; }
    .bubble:nth-child(6) { width: 40px; height: 40px; left: 60%; animation-duration: 7s; animation-delay: 1.5s; }
    .bubble:nth-child(7) { width: 28px; height: 28px; left: 70%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .bubble:nth-child(8) { width: 55px; height: 55px; left: 80%; animation-duration: 8s; animation-delay: 1.2s; }
    .bubble:nth-child(9) { width: 32px; height: 32px; left: 15%; animation-duration: 6.5s; animation-delay: 2.5s; }
    .bubble:nth-child(10) { width: 48px; height: 48px; left: 85%; animation-duration: 7.5s; animation-delay: 0.9s; }
    .bubble:nth-child(11) { width: 26px; height: 26px; left: 45%; animation-duration: 5.5s; animation-delay: 1.8s; }
    .bubble:nth-child(12) { width: 38px; height: 38px; left: 75%; animation-duration: 7s; animation-delay: 0.2s; }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="bubbles-container">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>
</div>

</body>
</html>
